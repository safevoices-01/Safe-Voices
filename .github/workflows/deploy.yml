name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy gate
        run: |
          echo "CI succeeded on main. Deploy apps/web via Vercel Git integration."
          echo "Web build runs prisma migrate deploy automatically (see packages/prisma/scripts/migrate-deploy.mjs)."
          echo "Required production env: DATABASE_URL (pooler), DIRECT_URL (session :5432), plus .env.example / feat-0024."
          echo "Cron jobs: POST /api/internal/jobs/purge and /api/internal/jobs/orphan-uploads with CRON_SECRET"
