name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy gate
        run: |
          echo "CI succeeded on main. Deploy apps/web via Vercel Git integration."
          echo "Required production env: see .env.example and specs/feat-0024-security-operations/TECH.md"
          echo "Cron jobs: POST /api/internal/jobs/purge and /api/internal/jobs/orphan-uploads with CRON_SECRET"
