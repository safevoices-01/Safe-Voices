name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @safevoices/prisma run db:generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - name: Build web app
        run: pnpm --filter @safevoices/web run build
        env:
          SAFEVOICES_SECRET_PEPPER: ci-build-pepper
      - name: Install Playwright browsers
        run: pnpm --filter @safevoices/web exec playwright install --with-deps chromium
      - name: E2E tests
        run: pnpm --filter @safevoices/web run test:e2e
        env:
          CI: true
